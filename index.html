<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>✨ Happy Birthday Như Hảo | Nothing's Gonna Change My Love ✨</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, #2a142e, #0e0812);
    font-family: 'Poppins', 'Segoe UI', 'Dancing Script', cursive, sans-serif;
    overflow-x: hidden;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s ease;
  }

  .ambient-glow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 30%, rgba(255, 180, 200, 0.25), rgba(20, 5, 25, 0.7));
    pointer-events: none;
    z-index: 0;
    animation: breatheGlow 8s ease-in-out infinite;
  }

  @keyframes breatheGlow {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }

  .floating-particle {
    position: fixed;
    background: radial-gradient(circle, #ffb7c5, #ff6a88);
    border-radius: 50%;
    filter: blur(3px);
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
  }

  .cinema-container {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 700px;
    margin: 2rem auto;
  }

  .story-card {
    background: rgba(20, 12, 28, 0.55);
    backdrop-filter: blur(12px);
    border-radius: 64px;
    padding: 2rem 2rem;
    border: 1px solid rgba(255, 210, 220, 0.5);
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,200,0.1) inset;
    text-align: center;
  }

  /* COUNTDOWN TIMER STYLES */
  .countdown-container {
    margin-bottom: 30px;
    padding: 20px;
    background: rgba(0,0,0,0.4);
    border-radius: 50px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 200, 210, 0.3);
  }
  
  .countdown-title {
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #ffb7c5;
    margin-bottom: 10px;
    font-weight: 300;
  }
  
  .countdown-timer {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  
  .countdown-unit {
    text-align: center;
    min-width: 70px;
  }
  
  .countdown-number {
    font-size: 2.5rem;
    font-weight: bold;
    background: linear-gradient(135deg, #ff8a9f, #ff4d6d);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 20px rgba(255,77,109,0.5);
  }
  
  .countdown-label {
    font-size: 0.7rem;
    color: #ffcfdf;
    letter-spacing: 1px;
  }
  
  .birthday-badge {
    margin-top: 15px;
    font-size: 0.8rem;
    color: #ffb7c5;
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .story-text {
    font-size: 2rem;
    font-weight: 500;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe6f0, #ffcddf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-family: 'Dancing Script', cursive;
    padding: 0.5rem;
  }

  .btn-next {
    margin-top: 25px;
    padding: 14px 38px;
    border-radius: 60px;
    background: linear-gradient(95deg, #ff8a9f, #ff4d6d);
    border: none;
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  
  .btn-next:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  
  .btn-next:disabled:hover {
    transform: none;
    box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
  }
  
  .btn-next.locked::after {
    content: "🔒";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
  }
  
  .btn-next.unlocked::after {
    content: "🎉";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    animation: shake 0.5s ease;
  }
  
  @keyframes shake {
    0%, 100% { transform: translateY(-50%) rotate(0deg); }
    25% { transform: translateY(-50%) rotate(10deg); }
    75% { transform: translateY(-50%) rotate(-10deg); }
  }

  /* NÚT BẬT NHẠC CHO MOBILE */
  .music-activator {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #ff4d6d, #ff8a9f);
    color: white;
    padding: 14px 32px;
    border-radius: 60px;
    font-size: 1.1rem;
    font-weight: bold;
    z-index: 300;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255,77,109,0.6);
    animation: bounce 1s infinite;
    border: none;
    font-family: 'Segoe UI', sans-serif;
    letter-spacing: 1px;
    backdrop-filter: blur(8px);
    white-space: nowrap;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-10px); }
  }
  
  .music-activator.hidden {
    display: none;
  }

  .cinema-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(16px);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 200;
    animation: fadeInPopup 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  @keyframes fadeInPopup {
    from { opacity: 0; backdrop-filter: blur(0px); }
    to { opacity: 1; backdrop-filter: blur(16px); }
  }

  .polaroid-frame {
    background: rgba(255, 245, 240, 0.95);
    padding: 18px 18px 35px 18px;
    border-radius: 28px;
    box-shadow: 0 35px 45px rgba(0,0,0,0.5), 0 0 0 3px #fff8, 0 0 0 6px #ffb7c5;
    max-width: 340px;
  }

  .cinema-popup img {
    width: 280px;
    height: auto;
    border-radius: 18px;
    display: block;
    margin: 0 auto;
    animation: gentleFloat 3s infinite ease-in-out;
  }

  @keyframes gentleFloat {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  .romantic-message {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    margin-top: 40px;
    padding: 30px 35px;
    border-radius: 60px;
    max-width: 85%;
    text-align: center;
    font-size: 1.35rem;
    line-height: 1.6;
    color: #fff5e6;
    border: 1px solid #ffb7c5;
    font-family: 'Segoe UI', 'Poppins', sans-serif;
  }

  .elegant-heart {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    filter: drop-shadow(0 0 4px #ff99aa);
    animation: floatHeartRomance 4s ease-out forwards;
  }

  @keyframes floatHeartRomance {
    0% { transform: translateY(0) scale(0.3); opacity: 0; }
    20% { opacity: 0.9; transform: translateY(-20px) scale(0.8); }
    80% { opacity: 0.8; transform: translateY(-120px) scale(1); }
    100% { transform: translateY(-220px) scale(0.5); opacity: 0; }
  }

  .star-twinkle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    z-index: 95;
    animation: twinkleStar 1.6s ease-out forwards;
  }

  @keyframes twinkleStar {
    0% { opacity: 1; transform: scale(0.2) rotate(0deg);}
    50% { opacity: 1; transform: scale(1.2) rotate(25deg);}
    100% { opacity: 0; transform: scale(0) rotate(60deg);}
  }

  .music-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 12px;
    color: #ffcfcf;
    z-index: 200;
    font-family: monospace;
  }

  @media (max-width: 550px) {
    .story-text { font-size: 1.6rem; min-height: 130px; }
    .btn-next { padding: 10px 28px; font-size: 1rem;}
    .romantic-message { font-size: 1.1rem; padding: 20px 20px; }
    .polaroid-frame img { width: 220px; }
    .countdown-number { font-size: 1.8rem; }
    .countdown-unit { min-width: 55px; }
    .music-activator { padding: 12px 24px; font-size: 1rem; white-space: nowrap; }
  }
</style>
</head>
<body>

<div class="ambient-glow"></div>

<!-- NÚT BẬT NHẠC CHO MOBILE (RẤT NỔI BẬT) -->
<button class="music-activator" id="musicActivatorBtn">🎵 BẬT NHẠC NGAY 🎵</button>

<div class="cinema-container">
  <div class="story-card">
    <div class="countdown-container">
      <div class="countdown-title">🎂 CHÀO ĐÓN SINH NHẬT NHƯ HẢO 🎂</div>
      <div class="countdown-timer" id="countdownTimer">
        <div class="countdown-unit">
          <div class="countdown-number" id="days">00</div>
          <div class="countdown-label">NGÀY</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-number" id="hours">00</div>
          <div class="countdown-label">GIỜ</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-number" id="minutes">00</div>
          <div class="countdown-label">PHÚT</div>
        </div>
        <div class="countdown-unit">
          <div class="countdown-number" id="seconds">00</div>
          <div class="countdown-label">GIÂY</div>
        </div>
      </div>
      <div class="birthday-badge" id="birthdayMessage">🎵 Nhấn nút BẬT NHẠC bên dưới để nghe nhé! 🎵</div>
    </div>
    
    <div class="story-text" id="storyText"></div>
    <button class="btn-next locked" id="nextBtn" disabled>🔒 Chờ đến sinh nhật 🔒</button>
  </div>
</div>

<div class="cinema-popup" id="cinemaPopup">
  <div class="polaroid-frame">
    <img id="birthdayImage" src="image.jpg" alt="Như Hảo Birthday">
  </div>
  <div class="romantic-message" id="finalRomanticMsg"></div>
</div>

<div class="music-hint" id="musicHint">🎵 Chưa bật nhạc • Nhấn nút bên dưới 🎵</div>

<audio id="bgMelody" loop preload="auto">
  <source src="nothing.mp3" type="audio/mpeg">
</audio>

<script>
  // ========== COUNTDOWN TIMER ==========
  function getTaiwanBirthday() {
    const taiwanOffset = 8;
    const targetUTC = Date.UTC(2026, 3, 24, 0 - taiwanOffset, 0, 0);
    return new Date(targetUTC);
  }
  
  let countdownInterval;
  let birthdayReached = false;
  let storyUnlocked = false;
  
  const nextBtn = document.getElementById("nextBtn");
  const storyElement = document.getElementById("storyText");
  const musicActivatorBtn = document.getElementById("musicActivatorBtn");
  const bgMusic = document.getElementById("bgMelody");
  const musicHint = document.getElementById("musicHint");
  
  const storySequence = [
  "✨ Thật ra định nói gì đó hay ho... mà thôi nói đơn giản vậy ✨",
  "🌸 Có một người tên 'Như Hảo' – nghe tên thôi đã thấy chua cay 🌸",
  "🍃 Dễ thương theo cách riêng, đôi lúc hơi cọc (chắc đang suy nghĩ chuyện lớn lao) 🍃",
  "🌙 NGỦ SỚM, SỐNG KHOA HỌC – lời nhắc thân thiện mỗi năm một lần 🌙",
  "💫 Và thật ra, sự bình tĩnh đó lại khiến người khác để ý nhiều hơn 💫",
  "🍂 Nên hôm nay, coi như một dịp hợp lý để... 🍂",
  "🎀 Gửi đến bạn một điều nho nhỏ (gọi là có lòng) 🎀",
  "😄 Chúc bạn sinh nhật vui vẻ – tuổi mới vẫn là bạn, nhưng phiên bản ổn hơn xíu 😄"
];
  
  let stepIdx = 0;
  let isTyping = false;
  let typeInterval = null;
  let musicStarted = false;
  
  // HÀM BẬT NHẠC (gọi khi người dùng click nút hoặc chạm màn hình)
  function enableMusic() {
    if (musicStarted) return true;
    
    bgMusic.volume = 0.5;
    bgMusic.loop = true;
    
    return bgMusic.play().then(() => {
      musicStarted = true;
      musicHint.innerHTML = "🎵 Nothing's Gonna Change My Love For You • đang phát 🎵";
      musicHint.style.background = "rgba(0,0,0,0.5)";
      
      // Ẩn nút bật nhạc
      musicActivatorBtn.classList.add('hidden');
      
      // Đổi thông báo
      const msgElem = document.getElementById('birthdayMessage');
      if (!birthdayReached) {
        msgElem.innerHTML = '🎵 Nhạc đang phát! Chờ đến 0h 24/04 để mở tiếp nhé 🎵';
      }
      
      console.log("Nhạc đã được bật thành công!");
      return true;
    }).catch((error) => {
      console.log("Không thể bật nhạc:", error);
      musicHint.innerHTML = "🎵 🔇 Nhấn lại nút bên dưới để bật nhạc 🔇 🎵";
      return false;
    });
  }
  
  // Xử lý nút bật nhạc
  musicActivatorBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    enableMusic();
  });
  
  // Tự động kích hoạt khi người dùng chạm bất kỳ đâu trên màn hình (cho mobile)
  document.body.addEventListener("touchstart", () => {
    if (!musicStarted) {
      enableMusic();
    }
  }, { once: true });
  
  // Cho PC: click chuột cũng kích hoạt
  document.body.addEventListener("click", () => {
    if (!musicStarted) {
      enableMusic();
    }
  }, { once: true });
  
  function typeRomanticText(text, element, speed = 42, callback) {
    if (typeInterval) clearInterval(typeInterval);
    element.innerHTML = "";
    let idxChar = 0;
    isTyping = true;
    function addChar() {
      if (idxChar < text.length) {
        element.innerHTML += text[idxChar];
        idxChar++;
      } else {
        clearInterval(typeInterval);
        isTyping = false;
        if (callback) callback();
      }
    }
    typeInterval = setInterval(addChar, speed);
  }
  
  function unlockStory() {
    if (storyUnlocked) return;
    storyUnlocked = true;
    
    nextBtn.disabled = false;
    nextBtn.classList.remove('locked');
    nextBtn.classList.add('unlocked');
    nextBtn.innerHTML = '✨ Tiếp tục ✨ 🎉';
    loadStoryStep(0);
    
    for(let i = 0; i < 30; i++) {
      setTimeout(() => createElegantHeart(), i * 100);
    }
  }
  
  function loadStoryStep(step) {
    if (step < storySequence.length) {
      typeRomanticText(storySequence[step], storyElement, 42, null);
    }
  }
  
  function updateCountdown() {
    const now = new Date();
    const target = getTaiwanBirthday();
    const diff = target - now;
    
    const daysElem = document.getElementById('days');
    const hoursElem = document.getElementById('hours');
    const minutesElem = document.getElementById('minutes');
    const secondsElem = document.getElementById('seconds');
    const birthdayMsgElem = document.getElementById('birthdayMessage');
    
    if (diff <= 0 && !birthdayReached) {
      birthdayReached = true;
      if (countdownInterval) clearInterval(countdownInterval);
      
      daysElem.textContent = '00';
      hoursElem.textContent = '00';
      minutesElem.textContent = '00';
      secondsElem.textContent = '00';
      birthdayMsgElem.innerHTML = '🎉✨ HÔM NAY LÀ SINH NHẬT NHƯ HẢO! ĐÃ ĐẾN LÚC MỞ QUÀ RỒI ✨🎉';
      birthdayMsgElem.style.animation = 'pulse 0.5s infinite';
      
      unlockStory();
      
      for(let i = 0; i < 50; i++) {
        setTimeout(() => createElegantHeart(), i * 80);
        setTimeout(() => {
          const star = document.createElement('div');
          star.className = 'star-twinkle';
          star.innerHTML = '🎂';
          star.style.left = Math.random() * 100 + '%';
          star.style.fontSize = '30px';
          document.body.appendChild(star);
          setTimeout(() => star.remove(), 1500);
        }, i * 100);
      }
      return;
    }
    
    if (diff > 0) {
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (86400000)) / (3600000));
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);
      
      daysElem.textContent = String(days).padStart(2, '0');
      hoursElem.textContent = String(hours).padStart(2, '0');
      minutesElem.textContent = String(minutes).padStart(2, '0');
      secondsElem.textContent = String(seconds).padStart(2, '0');
      
      if (!birthdayReached && !musicStarted) {
        birthdayMsgElem.innerHTML = '🎵 Nhấn nút BẬT NHẠC bên dưới để nghe nhé! 🎵';
      } else if (days === 0 && hours === 0 && minutes < 30) {
        birthdayMsgElem.innerHTML = '💗 Sắp đến giờ G rồi! Sắp được mở rồi! 💗';
      } else if (days === 0 && hours < 6) {
        birthdayMsgElem.innerHTML = '🌙 Chỉ còn vài giờ nữa thôi... Nghe nhạc chờ đợi nhé 🌙';
      } else if (musicStarted) {
        birthdayMsgElem.innerHTML = '🎵 Nhạc đang phát! Đếm ngược tới khoảnh khắc có thể mở tiếp... 🎵';
      }
    }
  }
  
  countdownInterval = setInterval(updateCountdown, 1000);
  updateCountdown();
  
  // ========== HIỆU ỨNG ==========
  const popup = document.getElementById("cinemaPopup");
  const finalMsgDiv = document.getElementById("finalRomanticMsg");
  
  function createRomanticParticles() {
    setInterval(() => {
      const particle = document.createElement('div');
      particle.className = 'floating-particle';
      const size = Math.random() * 8 + 3;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 5 + 4 + 's';
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 7000);
    }, 350);
  }
  
  function createElegantHeart() {
    const heartContainer = document.createElement('div');
    heartContainer.className = 'elegant-heart';
    const heartIcon = ['💖', '💗', '💕', '💓', '🌸', '✨', '💞'][Math.floor(Math.random() * 7)];
    heartContainer.innerHTML = heartIcon;
    heartContainer.style.left = Math.random() * 100 + '%';
    heartContainer.style.fontSize = (Math.random() * 28 + 18) + 'px';
    document.body.appendChild(heartContainer);
    setTimeout(() => heartContainer.remove(), 4200);
  }
  
  function startRomanticEffects() {
    setInterval(() => {
      if (popup.style.display !== 'flex') createElegantHeart();
      else for(let i=0;i<2;i++) createElegantHeart();
    }, 400);
    setInterval(() => {
      const star = document.createElement('div');
      star.className = 'star-twinkle';
      star.innerHTML = ['✨', '⭐', '🌟', '💫'][Math.floor(Math.random()*4)];
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 80 + '%';
      star.style.fontSize = (Math.random() * 25 + 12) + 'px';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 1600);
    }, 500);
  }
  
  createRomanticParticles();
  startRomanticEffects();
  
  function nextStoryStep() {
    if (!storyUnlocked) {
      const msg = document.getElementById('birthdayMessage');
      msg.style.animation = 'none';
      msg.offsetHeight;
      msg.style.animation = 'pulse 0.5s ease';
      msg.innerHTML = '⏰ Chưa đến giờ đâu! Phải chờ đến 0h 24/04 mới mở được nè! ⏰';
      setTimeout(() => {
        if (!birthdayReached && musicStarted) {
          msg.innerHTML = '🎵 Nhạc đang phát! Đếm ngược tới khoảnh khắc có thể mở tiếp... 🎵';
        } else if (!birthdayReached && !musicStarted) {
          msg.innerHTML = '🎵 Nhấn nút BẬT NHẠC bên dưới để nghe nhé! 🎵';
        }
      }, 3000);
      return;
    }
    if (isTyping) return;
    
    if (stepIdx + 1 < storySequence.length) {
      stepIdx++;
      loadStoryStep(stepIdx);
    } else if (stepIdx + 1 === storySequence.length) {
      stepIdx++;
      revealCinematicBirthday();
    }
  }
  
  function revealCinematicBirthday() {
    if (popup.style.display === 'flex') return;
    popup.style.display = 'flex';
    if (typeInterval) clearInterval(typeInterval);
    
   const finalMessages = [
  "🎀 Happy Birthday, Như Hảo! 🎀",
  "🌷 Chúc m sinh nhật vui vẻ, ít deadline lại chút cho dễ thở 🌷",
  "❄️ Nhìn thì lạnh lạnh vậy thôi chứ cũng không phải kiểu khó gần lắm ❄️",
  "🍂 Nói chung là… cũng có nét riêng nên người ta nhớ 🍂",
  "✨ Qua Đài Loan chắc không nhẹ nhàng gì, m ráng giữ sức nha ✨",
  "💪 Vừa học vừa làm thì từ từ thôi, đừng ép bản thân quá 💪",
  "😴 Thiếu ngủ hoài là xuống sắc thiệt đó, đừng chủ quan 😴",
  "🍜 Tui thấy m nên ăn uống tử tế lại, đừng để bụng biểu tình 🍜",
  "💖 Có mấy chuyện không cần nói nhiều, hiểu là được 💖",
  "😌 Với lại… cũng có người thỉnh thoảng nghĩ tới m thôi 😌",
  "🎂 Chúc m sinh nhật vui vẻ – mong version mới của m ổn áp hơn 🎂"
];
    
    let msgIndex = 0;
    finalMsgDiv.innerHTML = "";
    function appendNextMessage() {
      if (msgIndex < finalMessages.length) {
        const p = document.createElement("div");
        p.style.opacity = "0";
        p.style.transform = "translateY(12px)";
        p.style.transition = "all 0.4s ease";
        p.style.marginBottom = "15px";
        p.innerHTML = finalMessages[msgIndex];
        finalMsgDiv.appendChild(p);
        setTimeout(() => { p.style.opacity = "1"; p.style.transform = "translateY(0)"; }, 30);
        msgIndex++;
        setTimeout(appendNextMessage, 720);
      } else {
        for(let i=0;i<28;i++) setTimeout(() => createElegantHeart(), i*100);
      }
    }
    appendNextMessage();
  }
  
  nextBtn.addEventListener('click', nextStoryStep);
  
  document.addEventListener('click', (e) => {
    for(let i=0;i<3;i++) {
      const spark = document.createElement('div');
      spark.className = 'star-twinkle';
      spark.innerHTML = '💖';
      spark.style.left = (e.clientX + (Math.random()*30 -15)) + 'px';
      spark.style.top = (e.clientY + (Math.random()*30 -15)) + 'px';
      spark.style.position = 'fixed';
      spark.style.pointerEvents = 'none';
      document.body.appendChild(spark);
      setTimeout(()=>spark.remove(), 800);
    }
  });
  
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth) * 100;
    const y = (e.clientY / window.innerHeight) * 100;
    document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, #2a142e, #0e0812)`;
  });
</script>
