<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✨ Happy Birthday Hảo Hảo | Nothing's Gonna Change My Love ✨</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, #2a142e, #0e0812);
    font-family: 'Poppins', 'Segoe UI', 'Dancing Script', cursive, sans-serif;
    overflow-x: hidden;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.2s ease;
  }

  /* romantic animated glow */
  .ambient-glow {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 30%, rgba(255, 180, 200, 0.25), rgba(20, 5, 25, 0.7));
    pointer-events: none;
    z-index: 0;
    animation: breatheGlow 8s ease-in-out infinite;
  }

  @keyframes breatheGlow {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.6; }
  }

  /* floating romantic particles */
  .floating-particle {
    position: fixed;
    background: radial-gradient(circle, #ffb7c5, #ff6a88);
    border-radius: 50%;
    filter: blur(3px);
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
  }

  .cinema-container {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 700px;
    margin: 2rem auto;
  }

  .story-card {
    background: rgba(20, 12, 28, 0.55);
    backdrop-filter: blur(12px);
    border-radius: 64px;
    padding: 2rem 2rem;
    border: 1px solid rgba(255, 210, 220, 0.5);
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,200,0.1) inset;
    text-align: center;
  }

  .story-text {
    font-size: 2rem;
    font-weight: 500;
    min-height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe6f0, #ffcddf);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-family: 'Dancing Script', cursive;
    padding: 0.5rem;
    text-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }

  .btn-next {
    margin-top: 25px;
    padding: 14px 38px;
    border-radius: 60px;
    background: linear-gradient(95deg, #ff8a9f, #ff4d6d);
    border: none;
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-next:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(255, 77, 109, 0.6);
  }

  .cinema-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(16px);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 200;
    animation: fadeInPopup 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  @keyframes fadeInPopup {
    from { opacity: 0; backdrop-filter: blur(0px); }
    to { opacity: 1; backdrop-filter: blur(16px); }
  }

  .polaroid-frame {
    background: rgba(255, 245, 240, 0.95);
    padding: 18px 18px 35px 18px;
    border-radius: 28px;
    box-shadow: 0 35px 45px rgba(0,0,0,0.5), 0 0 0 3px #fff8, 0 0 0 6px #ffb7c5;
    max-width: 340px;
  }

  .cinema-popup img {
    width: 280px;
    height: auto;
    border-radius: 18px;
    display: block;
    margin: 0 auto;
    animation: gentleFloat 3s infinite ease-in-out;
  }

  @keyframes gentleFloat {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
  }

  .romantic-message {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(12px);
    margin-top: 40px;
    padding: 30px 35px;
    border-radius: 60px;
    max-width: 85%;
    text-align: center;
    font-size: 1.35rem;
    line-height: 1.6;
    color: #fff5e6;
    border: 1px solid #ffb7c5;
    font-family: 'Segoe UI', 'Poppins', sans-serif;
  }

  .elegant-heart {
    position: fixed;
    pointer-events: none;
    z-index: 99;
    filter: drop-shadow(0 0 4px #ff99aa);
    animation: floatHeartRomance 4s ease-out forwards;
  }

  @keyframes floatHeartRomance {
    0% { transform: translateY(0) scale(0.3); opacity: 0; }
    20% { opacity: 0.9; transform: translateY(-20px) scale(0.8); }
    80% { opacity: 0.8; transform: translateY(-120px) scale(1); }
    100% { transform: translateY(-220px) scale(0.5); opacity: 0; }
  }

  .star-twinkle {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    z-index: 95;
    animation: twinkleStar 1.6s ease-out forwards;
  }

  @keyframes twinkleStar {
    0% { opacity: 1; transform: scale(0.2) rotate(0deg);}
    50% { opacity: 1; transform: scale(1.2) rotate(25deg);}
    100% { opacity: 0; transform: scale(0) rotate(60deg);}
  }

  .music-hint {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 12px;
    color: #ffcfcf;
    z-index: 200;
    font-family: monospace;
  }

  @media (max-width: 550px) {
    .story-text { font-size: 1.6rem; min-height: 130px; }
    .btn-next { padding: 10px 28px; font-size: 1rem;}
    .romantic-message { font-size: 1.1rem; padding: 20px 20px; }
    .polaroid-frame img { width: 220px; }
  }
</style>
</head>
<body>

<div class="ambient-glow"></div>
<div class="cinema-container">
  <div class="story-card">
    <div class="story-text" id="storyText"></div>
    <button class="btn-next" id="nextBtn">✨ Tiếp tục ✨</button>
  </div>
</div>

<div class="cinema-popup" id="cinemaPopup">
  <div class="polaroid-frame">
    <!-- SỬA: dùng image.jpg của bạn -->
    <img id="birthdayImage" src="image.jpg" alt="Hảo Hảo Birthday">
  </div>
  <div class="romantic-message" id="finalRomanticMsg"></div>
</div>

<div class="music-hint" id="musicHint">🎵 Nothing's Gonna Change My Love For You • đang phát 🎵</div>

<!-- SỬA: dùng nothing.mp3 của bạn -->
<audio id="bgMelody" loop preload="auto">
  <source src="nothing.mp3" type="audio/mpeg">
</audio>

<script>
  // ------------------- ROMANTIC STORY ------------------
  const storySequence = [
    "✨ Hôm nay ánh trăng kể chuyện... ✨",
    "🌸 Có một người tên 'Như Hảo' 🌸",
    "🍃 Dễ thương theo cách rất riêng, đôi khi lạnh lùng... nhưng tim ấm áp 🍃",
    "🌙 Ngủ sớm, sống khoa học – maybe...🌙",
    "🍂 Nên hôm nay, vì một người đặc biệt... 🍂",
    "🎀 Một điều bất ngờ được tạo nên từ tất cả rung động 🎀",
    "🥺 Chỉ dành riêng cho bạn... người khiến trái tim này 'hỏng' mất rồi 🥺"
  ];

  let stepIdx = 0;
  let isTyping = false;
  let typeInterval = null;
  const storyElement = document.getElementById("storyText");
  const nextBtn = document.getElementById("nextBtn");
  const popup = document.getElementById("cinemaPopup");
  const finalMsgDiv = document.getElementById("finalRomanticMsg");
  const bgMusic = document.getElementById("bgMelody");
  const musicHint = document.getElementById("musicHint");

  // Cấu hình nhạc
  bgMusic.volume = 0.5;
  bgMusic.loop = true;
  
  // 🔥 GIẢI PHÁP TỰ ĐỘNG PHÁT NHẠC 🔥
  // Cách 1: Thử play ngay lập tức (sẽ bị browser chặn nhưng có fallback)
  // Cách 2: Dùng kỹ thuật "click ẩn" hoặc "tự động play sau khi user tương tác"
  // Cách tốt nhất: Hiển thị overlay yêu cầu click, nhưng để trải nghiệm mượt mà:
  
  let musicStarted = false;
  let autoPlayAttempted = false;
  
  // Hàm phát nhạc
  function attemptAutoPlay() {
    if (musicStarted) return;
    
    bgMusic.play().then(() => {
      musicStarted = true;
      musicHint.style.opacity = "1";
      musicHint.innerHTML = "🎵 Nothing's Gonna Change My Love For You • đang phát 🎵";
      console.log("Nhạc đã tự động phát thành công!");
    }).catch((error) => {
      console.log("Autoplay bị chặn:", error);
      musicHint.innerHTML = "🎵 🔇 Nhấp vào màn hình để bật nhạc 🎵";
      musicHint.style.cursor = "pointer";
      musicHint.style.background = "#ff4d6d";
      
      // Thêm sự kiện click cho toàn bộ trang để bật nhạc lần đầu
      const enableMusic = () => {
        if (!musicStarted) {
          bgMusic.play().then(() => {
            musicStarted = true;
            musicHint.innerHTML = "🎵 Nothing's Gonna Change My Love For You • đang phát 🎵";
            musicHint.style.background = "rgba(0,0,0,0.5)";
            musicHint.style.cursor = "default";
          }).catch(e => console.log("Still blocked"));
        }
        document.removeEventListener("click", enableMusic);
        document.removeEventListener("touchstart", enableMusic);
      };
      
      document.addEventListener("click", enableMusic);
      document.addEventListener("touchstart", enableMusic);
    });
  }
  
  // Thử auto play ngay khi trang load
  setTimeout(attemptAutoPlay, 100);
  
  // Thêm sự kiện cho nút next để đảm bảo nhạc chạy
  nextBtn.addEventListener("click", () => {
    if (!musicStarted) {
      attemptAutoPlay();
    }
  });
  
  // Typing effect
  function typeRomanticText(text, element, speed = 42, callback) {
    if (typeInterval) clearInterval(typeInterval);
    element.innerHTML = "";
    let idxChar = 0;
    isTyping = true;
    function addChar() {
      if (idxChar < text.length) {
        element.innerHTML += text[idxChar];
        idxChar++;
      } else {
        clearInterval(typeInterval);
        isTyping = false;
        if (callback) callback();
      }
    }
    typeInterval = setInterval(addChar, speed);
  }
  
  function loadStoryStep(step) {
    if (step < storySequence.length) {
      typeRomanticText(storySequence[step], storyElement, 42, null);
    }
  }
  loadStoryStep(0);
  
  // Floating romantic effects
  function createRomanticParticles() {
    setInterval(() => {
      const particle = document.createElement('div');
      particle.className = 'floating-particle';
      const size = Math.random() * 8 + 3;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 5 + 4 + 's';
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 7000);
    }, 350);
  }
  
  function createElegantHeart() {
    const heartContainer = document.createElement('div');
    heartContainer.className = 'elegant-heart';
    const heartIcon = ['💖', '💗', '💕', '💓', '🌸', '✨', '💞'][Math.floor(Math.random() * 7)];
    heartContainer.innerHTML = heartIcon;
    heartContainer.style.left = Math.random() * 100 + '%';
    heartContainer.style.fontSize = (Math.random() * 28 + 18) + 'px';
    document.body.appendChild(heartContainer);
    setTimeout(() => heartContainer.remove(), 4200);
  }
  
  function startRomanticEffects() {
    setInterval(() => {
      if (popup.style.display !== 'flex') createElegantHeart();
      else for(let i=0;i<2;i++) createElegantHeart();
    }, 400);
    setInterval(() => {
      const star = document.createElement('div');
      star.className = 'star-twinkle';
      star.innerHTML = ['✨', '⭐', '🌟', '💫'][Math.floor(Math.random()*4)];
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 80 + '%';
      star.style.fontSize = (Math.random() * 25 + 12) + 'px';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 1600);
    }, 500);
  }
  
  createRomanticParticles();
  startRomanticEffects();
  
  // Next story step
  function nextStoryStep() {
    if (isTyping) return;
    if (stepIdx + 1 < storySequence.length) {
      stepIdx++;
      loadStoryStep(stepIdx);
    } else if (stepIdx + 1 === storySequence.length) {
      stepIdx++;
      revealCinematicBirthday();
    }
  }
  
  function revealCinematicBirthday() {
    popup.style.display = 'flex';
    if (typeInterval) clearInterval(typeInterval);
    
    const finalMessages = [
      "🎀 Happy Birthday, Hảo Hảo! 🎀",
      "🌷 'Nothing's gonna change my love for you' 🌷",
      "❄️ Người lạnh lùng nhưng trái tim lại ấm áp đến lạ ❄️",
      "🍂 Mỗi dòng code này đều viết bằng nỗi nhớ và sự rung động 🍂",
      "✨ Cậu khiến tôi nhận ra, lạnh lùng cũng là một kiểu dịu dàng ✨",
      "🌸 Chúc cậu luôn xinh đẹp, bình yên và hạnh phúc rạng ngời 🌸",
      "💖 Và biết không? Người tạo ra điều này...",
      "💘 để ý cậu nhiều lắm, nhiều hơn cả ngàn vì sao 💘",
      "🎂 Chúc mừng sinh nhật, công chúa lạnh lùng 🎂"
    ];
    
    let msgIndex = 0;
    finalMsgDiv.innerHTML = "";
    function appendNextMessage() {
      if (msgIndex < finalMessages.length) {
        const p = document.createElement("div");
        p.style.opacity = "0";
        p.style.transform = "translateY(12px)";
        p.style.transition = "all 0.4s ease";
        p.style.marginBottom = "15px";
        p.innerHTML = finalMessages[msgIndex];
        finalMsgDiv.appendChild(p);
        setTimeout(() => { p.style.opacity = "1"; p.style.transform = "translateY(0)"; }, 30);
        msgIndex++;
        setTimeout(appendNextMessage, 720);
      } else {
        for(let i=0;i<28;i++) setTimeout(() => createElegantHeart(), i*100);
      }
    }
    appendNextMessage();
  }
  
  nextBtn.addEventListener('click', nextStoryStep);
  
  // Click sparkles
  document.addEventListener('click', (e) => {
    for(let i=0;i<3;i++) {
      const spark = document.createElement('div');
      spark.className = 'star-twinkle';
      spark.innerHTML = '💖';
      spark.style.left = (e.clientX + (Math.random()*30 -15)) + 'px';
      spark.style.top = (e.clientY + (Math.random()*30 -15)) + 'px';
      spark.style.position = 'fixed';
      spark.style.pointerEvents = 'none';
      document.body.appendChild(spark);
      setTimeout(()=>spark.remove(), 800);
    }
  });
  
  // Mouse move gradient
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth) * 100;
    const y = (e.clientY / window.innerHeight) * 100;
    document.body.style.background = `radial-gradient(circle at ${x}% ${y}%, #2a142e, #0e0812)`;
  });
</script>
</body>
</html>
